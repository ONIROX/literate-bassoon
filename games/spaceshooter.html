<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Space Shooter</title>\n    <style>\n        body { margin: 0; overflow: hidden; }\n        canvas { background: black; display: block; margin: auto; }\n    </style>\n</head>\n<body>\n    <canvas id=\"gameCanvas\"></canvas>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        canvas.width = window.innerWidth;\n        canvas.height = window.innerHeight;\n        let spaceship;\n        let bullets = [];\n        let enemies = [];\n        let score = 0;\n        let gameOver = false;\n        const spaceshipWidth = 50;\n        const spaceshipHeight = 30;\n        const bulletSpeed = 5;\n        const enemySpeed = 3;\n        const enemySpawnRate = 1000; // milliseconds\n        \n        class Spaceship {\n            constructor() {\n                this.x = canvas.width / 2 - spaceshipWidth / 2;\n                this.y = canvas.height - spaceshipHeight - 10;\n                this.width = spaceshipWidth;\n                this.height = spaceshipHeight;\n                this.color = 'white';\n            }\n            draw() {\n                ctx.fillStyle = this.color;\n                ctx.fillRect(this.x, this.y, this.width, this.height);\n            }\n            move(direction) {\n                this.x += direction;\n                if (this.x < 0) this.x = 0;\n                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;\n            }\n        }\n        \n        class Bullet {\n            constructor(x, y) {\n                this.x = x;\n                this.y = y;\n                this.width = 5;\n                this.height = 10;\n                this.color = 'yellow';\n            }\n            draw() {\n                ctx.fillStyle = this.color;\n                ctx.fillRect(this.x, this.y, this.width, this.height);\n            }\n            update() {\n                this.y -= bulletSpeed;\n            }\n        }\n        \n        class Enemy {\n            constructor() {\n                this.x = Math.random() * (canvas.width - 50);\n                this.y = 0;\n                this.width = 50;\n                this.height = 30;\n                this.color = 'red';\n            }\n            draw() {\n                ctx.fillStyle = this.color;\n                ctx.fillRect(this.x, this.y, this.width, this.height);\n            }\n            update() {\n                this.y += enemySpeed;\n            }\n        }\n        \n        function spawnEnemy() {\n            enemies.push(new Enemy());\n        }\n        \n        function checkCollision(rect1, rect2) {\n            return rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x && rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;\n        }\n        \n        function update() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            spaceship.draw();\n            bullets.forEach((bullet, index) => {\n                bullet.update();\n                bullet.draw();\n                if (bullet.y < 0) {\n                    bullets.splice(index, 1);\n                }\n            });\n            enemies.forEach((enemy, index) => {\n                enemy.update();\n                enemy.draw();\n                if (checkCollision(spaceship, enemy)) {\n                    gameOver = true;\n                }\n                bullets.forEach((bullet, bulletIndex) => {\n                    if (checkCollision(bullet, enemy)) {\n                        enemies.splice(index, 1);\n                        bullets.splice(bulletIndex, 1);\n                        score += 10;\n                    }\n                });\n                if (enemy.y > canvas.height) {\n                    enemies.splice(index, 1);\n                }\n            });\n            if (gameOver) {\n                ctx.fillStyle = 'red';\n                ctx.font = '48px Arial';\n                ctx.fillText('Game Over', canvas.width / 2 - 100, canvas.height / 2);\n                ctx.fillText('Score: ' + score, canvas.width / 2 - 60, canvas.height / 2 + 50);\n                return;\n            }\n            requestAnimationFrame(update);\n        }\n        \n        document.addEventListener('keydown', (event) => {\n            if (event.code === 'ArrowLeft') {\n                spaceship.move(-15);\n            } else if (event.code === 'ArrowRight') {\n                spaceship.move(15);\n            } else if (event.code === 'Space') {\n                bullets.push(new Bullet(spaceship.x + spaceship.width / 2 - 2.5, spaceship.y));\n            }\n        });\n        \n        window.onload = () => {\n            spaceship = new Spaceship();\n            setInterval(spawnEnemy, enemySpawnRate);\n            update();\n        };\n    </script>\n</body>\n</html>\n
