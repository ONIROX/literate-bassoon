<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>2048 Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #faf8ef;
        }
        .game-container {
            position: relative;
            width: 400px;
            height: 400px;
            background: #bbada0;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        .tile {
            position: absolute;
            width: 90px;
            height: 90px;
            line-height: 90px;
            font-size: 45px;
            font-weight: bold;
            color: white;
            border-radius: 5px;
            text-align: center;
        }
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; }
        .tile-16 { background: #f59563; }
        .tile-32 { background: #f67c5f; }
        .tile-64 { background: #f67c5f; }
        .tile-128 { background: #edcf72; }
        .tile-256 { background: #edcc61; }
        .tile-512 { background: #edc850; }
        .tile-1024 { background: #edc53f; }
        .tile-2048 { background: #edc22c; }
    </style>
</head>
<body>
<div class="game-container" id="game-container">
</div>
<script>
    const container = document.getElementById('game-container');
    let board = Array.from({ length: 4 }, () => Array(4).fill(0));

    function init() {
        addRandomTile();
        addRandomTile();
        draw();
        document.addEventListener('keydown', handleKey);
    }

    function addRandomTile() {
        const emptyCells = [];
        for (let i = 0; i < 4; i++) {
            for (let j = 0; j < 4; j++) {
                if (board[i][j] === 0) emptyCells.push({ i, j });
            }
        }
        if (emptyCells.length > 0) {
            const { i, j } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            board[i][j] = Math.random() < 0.9 ? 2 : 4;
        }
    }

    function draw() {
        container.innerHTML = '';
        board.forEach((row, i) => {
            row.forEach((value, j) => {
                if (value > 0) {
                    const tile = document.createElement('div');
                    tile.className = `tile tile-${value}`;
                    tile.innerText = value;
                    tile.style.top = `${i * 100}px`;
                    tile.style.left = `${j * 100}px`;
                    container.appendChild(tile);
                }
            });
        });
    }

    function handleKey(event) {
        switch (event.key) {
            case 'ArrowUp': moveUp(); break;
            case 'ArrowDown': moveDown(); break;
            case 'ArrowLeft': moveLeft(); break;
            case 'ArrowRight': moveRight(); break;
        }
    }

    function moveUp() {
        // Implement merge and slide logic for upward movement
    }

    function moveDown() {
        // Implement merge and slide logic for downward movement
    }

    function moveLeft() {
        // Implement merge and slide logic for leftward movement
    }

    function moveRight() {
        // Implement merge and slide logic for rightward movement
    }

    init();
</script>
</body>
</html>
