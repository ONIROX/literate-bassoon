<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pac-Man Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: black;\n            margin: 0;\n        }\n        canvas {\n            border: 2px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="gameCanvas" width="400" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        const box = 20;\n        const rows = canvas.height / box;\n        const cols = canvas.width / box;\n        let pacman = { x: 9 * box, y: 9 * box, direction: 'RIGHT' };\n        let pellets = [];\n        let ghosts = [ { x: 2 * box, y: 2 * box, direction: 'LEFT' } ];\n        let score = 0;\n        let gameInterval;\n\n        function createPellets() {\n            for (let i = 0; i < rows; i++) {\n                for (let j = 0; j < cols; j++) {\n                    pellets.push({ x: j * box, y: i * box });\n                }\n            }\n        }\n\n        function drawPacman() {\n            ctx.fillStyle = 'yellow';\n            ctx.fillRect(pacman.x, pacman.y, box, box);\n        }\n\n        function drawPellets() {\n            ctx.fillStyle = 'white';\n            pellets.forEach(pellet => {\n                ctx.fillRect(pellet.x, pellet.y, box, box);\n            });\n        }\n\n        function drawGhosts() {\n            ctx.fillStyle = 'red';\n            ghosts.forEach(ghost => {\n                ctx.fillRect(ghost.x, ghost.y, box, box);\n            });\n        }\n\n        function update() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            drawPellets();\n            drawGhosts();\n            drawPacman();\n            pacmanMove();\n            ghostMove();\n            checkPelletCollision();\n            checkGhostCollision();\n            ctx.fillStyle = 'white';\n            ctx.fillText('Score: ' + score, 10, canvas.height - 10);\n        }\n\n        function pacmanMove() {\n            if (pacman.direction === 'LEFT') pacman.x -= box;\n            if (pacman.direction === 'UP') pacman.y -= box;\n            if (pacman.direction === 'RIGHT') pacman.x += box;\n            if (pacman.direction === 'DOWN') pacman.y += box;\n            pacman.x = (pacman.x + canvas.width) % canvas.width;\n            pacman.y = (pacman.y + canvas.height) % canvas.height;\n        }\n\n        function ghostMove() {\n            ghosts.forEach(ghost => {\n                ghost.x += (ghost.direction === 'LEFT' ? -1 : 1) * box;\n                if (ghost.x < 0 || ghost.x >= canvas.width) ghost.direction = (ghost.direction === 'LEFT' ? 'RIGHT' : 'LEFT');\n            });\n        }\n\n        function checkPelletCollision() {\n            pellets = pellets.filter(pellet => {\n                if (pacman.x === pellet.x && pacman.y === pellet.y) {\n                    score++;\n                    return false;\n                }\n                return true;\n            });\n        }\n\n        function checkGhostCollision() {\n            ghosts.forEach(ghost => {\n                if (pacman.x === ghost.x && pacman.y === ghost.y) {\n                    clearInterval(gameInterval);\n                    alert('Game Over! Your score was: ' + score);\n                }\n            });\n        }\n\n        function control(e) {\n            if (e.key === 'ArrowLeft') pacman.direction = 'LEFT';\n            if (e.key === 'ArrowUp') pacman.direction = 'UP';\n            if (e.key === 'ArrowRight') pacman.direction = 'RIGHT';\n            if (e.key === 'ArrowDown') pacman.direction = 'DOWN';\n        }\n\n        createPellets();\n        document.addEventListener('keydown', control);\n        gameInterval = setInterval(update, 200);\n    </script>\n</body>\n</html>
