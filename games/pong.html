<!DOCTYPE html>
<html>
<head>
    <title>Pong Game</title>
    <style>
        canvas {
            background: black;
            display: block;
            margin: auto;
        }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("pong");
        const context = canvas.getContext("2d");
        const paddleWidth = 10, paddleHeight = 100;
        let player1Y = (canvas.height - paddleHeight) / 2;
        let player2Y = (canvas.height - paddleHeight) / 2;
        let ball = { x: canvas.width / 2, y: canvas.height / 2, size: 10, speedX: 5, speedY: 5 };

        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            // Draw paddles
            context.fillStyle = "white";
            context.fillRect(0, player1Y, paddleWidth, paddleHeight);
            context.fillRect(canvas.width - paddleWidth, player2Y, paddleWidth, paddleHeight);
            // Draw ball
            context.beginPath();
            context.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            context.fill();
            context.closePath();
        }

        function update() {
            ball.x += ball.speedX;
            ball.y += ball.speedY;
            // Ball collision with top and bottom
            if (ball.y < 0 || ball.y > canvas.height) {
                ball.speedY = -ball.speedY;
            }
            // Ball collision with paddles
            if ((ball.x < paddleWidth && ball.y > player1Y && ball.y < player1Y + paddleHeight) || 
                (ball.x > canvas.width - paddleWidth && ball.y > player2Y && ball.y < player2Y + paddleHeight)) {
                ball.speedX = -ball.speedX;
            }
            // Reset ball if it goes out of bounds
            if (ball.x < 0 || ball.x > canvas.width) {
                ball.x = canvas.width / 2;
                ball.y = canvas.height / 2;
                ball.speedX = 5;
                ball.speedY = 5;
            }
        }

        function controlPaddles(event) {
            if (event.key == "w") { // Player 1 up
                player1Y = Math.max(0, player1Y - 10);
            } else if (event.key == "s") { // Player 1 down
                player1Y = Math.min(canvas.height - paddleHeight, player1Y + 10);
            }
            if (event.key == "ArrowUp") { // Player 2 up
                player2Y = Math.max(0, player2Y - 10);
            } else if (event.key == "ArrowDown") { // Player 2 down
                player2Y = Math.min(canvas.height - paddleHeight, player2Y + 10);
            }
        }

        function gameLoop() {
            draw();
            update();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', controlPaddles);
        gameLoop();
    </script>
</body>
</html>
